<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo de Filmes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🎬</span>
        <h1>Catálogo<span class="logo-accent">Filmes</span></h1>
      </div>
      <div class="search-bar">
        <input type="text" id="search" placeholder="Buscar filme..." autocomplete="off" />
        <button id="btnSearch">Buscar</button>
      </div>
    </div>
  </header>

  <main>
    <div class="filter-bar">
      <span class="filter-label">Explorar:</span>
      <div class="filter-buttons">
        <button class="filter-btn active" data-endpoint="popular">Populares</button>
        <button class="filter-btn" data-endpoint="top_rated">Mais Bem Avaliados</button>
        <button class="filter-btn" data-endpoint="now_playing">Em Cartaz</button>
        <button class="filter-btn" data-endpoint="upcoming">Em Breve</button>
      </div>
    </div>

    <p id="message" class="message"></p>
    <div id="movie-list" class="movie-list"></div>
  </main>

  <footer>
    <p>Dados fornecidos por <a href="https://www.themoviedb.org" target="_blank">The Movie Database (TMDB)</a></p>
  </footer>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
   <div class="modal">
      <button id="modal-close" class="modal-close">✕</button>
      <div id="modal-content" class="modal-content"></div>
   </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
